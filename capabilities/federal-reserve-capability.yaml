      operations:
      - name: getcategoryseries
        method: GET
        description: Get series in a category
        inputParameters:
        - name: category_id
          in: query
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: releases
