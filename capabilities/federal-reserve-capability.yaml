naftiko: 1.0.0-alpha2
info:
  label: Federal Reserve FRED API
  description: The FRED API allows developers to retrieve economic data from the Federal Reserve Bank of St. Louis including
    categories, releases, series, sources, tags, and observations across thousands of economic time series.
  tags:
  - Federal
  - Reserve
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: federal-reserve
    baseUri: https://api.stlouisfed.org/fred
    description: Federal Reserve FRED API HTTP API.
    authentication:
      type: apikey
      in: query
      name: api_key
      value: '{{FEDERAL_RESERVE_TOKEN}}'
    resources:
    - name: category
      path: /category
      operations:
      - name: getcategory
        method: GET
        description: Get a category
        inputParameters:
        - name: category_id
          in: query
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: category-children
      path: /category/children
      operations:
      - name: getcategorychildren
        method: GET
        description: Get child categories
        inputParameters:
        - name: category_id
          in: query
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: category-series
