        method: GET
        description: Get all releases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: release
      path: /release
      operations:
      - name: getrelease
        method: GET
        description: Get a release
        inputParameters:
        - name: release_id
          in: query
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: release-series
      path: /release/series
      operations:
      - name: getreleaseseries
        method: GET
        description: Get series for a release
        inputParameters:
        - name: release_id
          in: query
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: series
      path: /series
